<!doctype html>
<html lang="en" data-theme="light" data-density="comfortable">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Clicky UI — live JSON demo</title>
    <meta
      name="description"
      content="Paste a Clicky JSON document and see it rendered live by @flanksource/clicky-ui running in-browser via Preact + Tailwind CDN."
    />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@flanksource/clicky-ui@0.1.0/src/styles/tokens.css"
    />

    <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>

    <link
      id="prism-light"
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism.min.css"
    />
    <link
      id="prism-dark"
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.min.css"
      disabled
    />
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/prism.min.js" data-manual></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/plugins/autoloader/prism-autoloader.min.js"></script>

    <style>
      /* Iconify web component needs a baseline inline sizing. */
      iconify-icon {
        display: inline-block;
        width: 1em;
        height: 1em;
        vertical-align: -0.125em;
      }

      /* Prism: keep the library's container chrome, strip Prism theme's own padding/bg. */
      pre[class*="language-"],
      code[class*="language-"] {
        background: transparent !important;
        padding: 0 !important;
        font-size: inherit;
        text-shadow: none;
      }
    </style>

    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script>
      tailwind.config = {
        darkMode: ["selector", '[data-theme="dark"]'],
        theme: {
          extend: {
            colors: {
              border: "hsl(var(--border))",
              input: "hsl(var(--input))",
              ring: "hsl(var(--ring))",
              background: "hsl(var(--background))",
              foreground: "hsl(var(--foreground))",
              primary: {
                DEFAULT: "hsl(var(--primary))",
                foreground: "hsl(var(--primary-foreground))",
              },
              secondary: {
                DEFAULT: "hsl(var(--secondary))",
                foreground: "hsl(var(--secondary-foreground))",
              },
              destructive: {
                DEFAULT: "hsl(var(--destructive))",
                foreground: "hsl(var(--destructive-foreground))",
              },
              muted: { DEFAULT: "hsl(var(--muted))", foreground: "hsl(var(--muted-foreground))" },
              accent: {
                DEFAULT: "hsl(var(--accent))",
                foreground: "hsl(var(--accent-foreground))",
              },
              popover: {
                DEFAULT: "hsl(var(--popover))",
                foreground: "hsl(var(--popover-foreground))",
              },
              card: { DEFAULT: "hsl(var(--card))", foreground: "hsl(var(--card-foreground))" },
            },
            borderRadius: {
              lg: "var(--radius)",
              md: "calc(var(--radius) - 2px)",
              sm: "calc(var(--radius) - 4px)",
            },
            spacing: {
              "control-h": "var(--control-height)",
              "control-px": "var(--control-padding-x)",
              "density-1": "var(--spacing-unit)",
              "density-2": "calc(var(--spacing-unit) * 2)",
              "density-3": "calc(var(--spacing-unit) * 3)",
              "density-4": "calc(var(--spacing-unit) * 4)",
            },
            fontSize: { "density-base": "var(--font-size-base)" },
          },
        },

    <script type="importmap">
      {
        "imports": {
          "preact": "https://esm.sh/preact@10.24.3",
          "preact/": "https://esm.sh/preact@10.24.3/",
          "preact/hooks": "https://esm.sh/preact@10.24.3/hooks",
          "preact/compat": "https://esm.sh/preact@10.24.3/compat",
          "preact/jsx-runtime": "https://esm.sh/preact@10.24.3/jsx-runtime",
          "react": "https://esm.sh/preact@10.24.3/compat",
          "react/": "https://esm.sh/preact@10.24.3/compat/",
          "react/jsx-runtime": "https://esm.sh/preact@10.24.3/jsx-runtime",
          "react-dom": "https://esm.sh/preact@10.24.3/compat",
          "react-dom/client": "https://esm.sh/preact@10.24.3/compat",

        }
      }

  </head>

  <body class="bg-background text-foreground antialiased">
    <header class="border-b border-border bg-background/80 backdrop-blur">
      <div class="mx-auto flex max-w-7xl items-center justify-between gap-4 px-4 py-3">
        <div>
          <h1 class="text-lg font-semibold">Clicky UI — live JSON demo</h1>
          <p class="text-xs text-muted-foreground">
            Paste a Clicky document on the left, see it rendered on the right. Powered by
            <a class="underline" href="https://www.npmjs.com/package/@flanksource/clicky-ui"
              >@flanksource/clicky-ui</a
            >
            + Preact via CDN.
          </p>
        </div>
        <div class="flex items-center gap-2 text-xs">
          <label for="sample-picker" class="sr-only">Sample</label>
          <select
            id="sample-picker"
            class="rounded-md border border-border bg-background px-2 py-1.5 text-xs hover:bg-accent focus:outline-none focus:ring-2 focus:ring-ring"
          ></select>
          <button
            id="btn-copy"
            class="rounded-md border border-border bg-background px-3 py-1.5 hover:bg-accent"
          >
            Copy JSON
          </button>
          <button
            id="btn-theme"
            class="rounded-md border border-border bg-background px-3 py-1.5 hover:bg-accent"
          >
            Toggle theme
          </button>
        </div>
      </div>
    </header>

    <main class="mx-auto grid max-w-7xl gap-4 px-4 py-4 md:grid-cols-2">
      <section class="flex min-h-[70vh] flex-col">
        <div class="mb-1 flex items-center justify-between text-xs text-muted-foreground">
          <span>Input (Clicky document or node)</span>
          <span id="parse-status" class="font-mono"></span>
        </div>
        <textarea
          id="input"
          spellcheck="false"
          class="h-full min-h-[60vh] w-full flex-1 resize-none rounded-md border border-border bg-background p-3 font-mono text-xs leading-relaxed outline-none focus:ring-2 focus:ring-ring"
        ></textarea>
      </section>

      <section class="flex min-h-[70vh] flex-col">
        <div class="mb-1 text-xs text-muted-foreground">Rendered output</div>
        <div
          id="output"
          class="h-full min-h-[60vh] flex-1 overflow-auto rounded-md border border-border bg-background p-4"
        ></div>
      </section>
    </main>

                  html: '<p>Supports <strong>bold</strong>, <em>italic</em>, <code>inline code</code>, and <a href="https://flanksource.com" target="_blank">links</a>. Scripts and event handlers are stripped.</p>',
                },
              },
            ],
          }),
        },
        {
          id: "inline-code",
          label: "Inline code within prose",
          description:
            "kind:\"text\" nodes can nest code blocks + inline monospace tokens inside their children array.",
          data: (() => {
            const inlineCode = (text) =>
              t(text, {
                monospace: true,
                backgroundColor: "#f1f5f9",
                color: "#0f172a",
              });
            return doc({
              kind: "map",
              fields: [
                {
                  name: "intro",
                  label: "Getting started",
                  value: {
                    kind: "text",
                    children: [
                      t("Install the package with "),
                      inlineCode("npm install @flanksource/clicky-ui"),
                      t(", import "),
                      inlineCode("Clicky"),
                      t(" from "),
                      inlineCode("@flanksource/clicky-ui"),
                      t(", then pass any Clicky document to the "),
                      inlineCode("data"),
                      t(" prop. A document is either a versioned envelope or a bare "),
                      inlineCode("ClickyNode"),
                      t("."),
                    ],
                  },
                },
                {
                  name: "mixed",
                  label: "Prose with a code block embedded",
                  value: {
                    kind: "text",
                    children: [
                      t("Here is a minimal React component. Note that "),
                      inlineCode("data"),
                      t(" accepts objects, strings (parsed as JSON), or pre-built nodes:"),
                      {
                        kind: "code",
                        language: "tsx",
                        source:
                          "import { Clicky } from '@flanksource/clicky-ui';\n\nexport function Status({ doc }) {\n  return <Clicky data={doc} />;\n}",
                      },
                      t("Components are built on shadcn/ui primitives, so any "),
                      inlineCode("className"),
                      t(" on the root passes through."),
                    ],
                  },
                },
                {
                  name: "shell",
                  label: "Shell snippet in a sentence",
                  value: {
                    kind: "text",
                    children: [
                      t("Run "),
                      inlineCode("pnpm --filter @flanksource/clicky-ui dev"),
                      t(" to start the dev server, then open "),
                      inlineCode("http://localhost:5173"),
                      t(". The kitchen-sink app hot-reloads on any change to "),
                      inlineCode("packages/ui/src/**/*"),
                      t("."),
                    ],
                  },
                },
              ],
            });
          })(),
        },
      ];

      const SAMPLES_BY_ID = Object.fromEntries(SAMPLES.map((s) => [s.id, s]));

      const $ = (id) => document.getElementById(id);
      const input = $("input");
      const output = $("output");
      const status = $("parse-status");
      const picker = $("sample-picker");

      const LANGUAGE_ALIASES = {
        sh: "bash",
        shell: "bash",
        yml: "yaml",
        ts: "typescript",
        js: "javascript",
        py: "python",
      };

      function highlightCodeBlocks(root) {
        if (typeof Prism === "undefined") return;
        for (const pre of root.querySelectorAll("pre:not([data-prism])")) {
          pre.dataset.prism = "true";
          const wrapper = pre.parentElement;
          const label = wrapper?.firstElementChild?.textContent?.trim().toLowerCase() ?? "";
          const lang = LANGUAGE_ALIASES[label] ?? label;
          // Unwrap: drop Clicky's border + language-tag header chrome so the <pre> sits flush.
          if (wrapper && wrapper.firstElementChild !== pre && wrapper.lastElementChild === pre) {
            wrapper.replaceWith(pre);
          }
          if (!lang) continue;
          const existingCode = pre.querySelector(":scope > code");
          const code = existingCode ?? document.createElement("code");
          if (!existingCode) {
            code.textContent = pre.textContent ?? "";
            pre.textContent = "";
            pre.appendChild(code);
          }
          pre.className = `${pre.className} language-${lang}`.trim();
          code.className = `language-${lang}`;
          Prism.highlightElement(code);
        }
      }

      // Highlight code blocks that get mounted lazily (e.g. when a table row expands its detail pane).
      new MutationObserver(() => highlightCodeBlocks(output)).observe(output, {
        childList: true,
        subtree: true,
      });

      function renderFromText(text) {
        try {
          const parsed = JSON.parse(text);
          status.textContent = "ok";
          status.className = "font-mono text-emerald-600";
          render(h(Clicky, { data: parsed }), output);
          highlightCodeBlocks(output);
        } catch (err) {
          status.textContent = err.message;
          status.className = "font-mono text-destructive";
        }
      }

      function loadSample(id) {
        const sample = SAMPLES_BY_ID[id];
        if (!sample) return;
        input.value = JSON.stringify(sample.data, null, 2);
        renderFromText(input.value);
        const hash = "#sample=" + encodeURIComponent(id);
        if (location.hash !== hash) history.replaceState(null, "", hash);
      }

      for (const sample of SAMPLES) {
        const option = document.createElement("option");
        option.value = sample.id;
        option.textContent = sample.label;
        option.title = sample.description;
        picker.appendChild(option);
      }

      const initialId =
        location.hash.match(/sample=([^&]+)/)?.[1] &&
        SAMPLES_BY_ID[decodeURIComponent(location.hash.match(/sample=([^&]+)/)[1])]
          ? decodeURIComponent(location.hash.match(/sample=([^&]+)/)[1])
          : SAMPLES[0].id;
      picker.value = initialId;
      loadSample(initialId);

      picker.addEventListener("change", () => loadSample(picker.value));

      window.addEventListener("hashchange", () => {
        const match = location.hash.match(/sample=([^&]+)/);
        const id = match ? decodeURIComponent(match[1]) : null;
        if (id && SAMPLES_BY_ID[id] && id !== picker.value) {
          picker.value = id;
          loadSample(id);
        }
      });

      let timer;
      input.addEventListener("input", () => {
        clearTimeout(timer);
        timer = setTimeout(() => renderFromText(input.value), 150);
      });

      $("btn-copy").addEventListener("click", async () => {
        try {
          await navigator.clipboard.writeText(input.value);
          $("btn-copy").textContent = "Copied!";
          setTimeout(() => ($("btn-copy").textContent = "Copy JSON"), 1200);
        } catch {
          $("btn-copy").textContent = "Copy failed";
        }
      });

      function applyPrismTheme(theme) {
        const light = $("prism-light");
        const dark = $("prism-dark");
        if (!light || !dark) return;
        light.disabled = theme === "dark";
        dark.disabled = theme !== "dark";
      }
      applyPrismTheme(document.documentElement.dataset.theme);

      $("btn-theme").addEventListener("click", () => {
        const next = document.documentElement.dataset.theme === "dark" ? "light" : "dark";
        document.documentElement.dataset.theme = next;
        applyPrismTheme(next);
      });

      input.addEventListener("paste", (e) => {
        const text = e.clipboardData?.getData("text");
        if (!text) return;
        try {
          JSON.parse(text);
          e.preventDefault();
          input.value = text;
          renderFromText(text);
        } catch {}
      });
    </script>
  </body>
</html>
