name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  gavel:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - run: corepack enable

      - name: Install Vite+
        run: curl -fsSL https://vite.plus | bash
      - name: Add Vite+ to PATH
        run: echo "$HOME/.vite-plus/bin" >> "$GITHUB_PATH"

      - run: vp install
      # gavel auto-discovers and runs `vitest` directly, bypassing the package's
      # `test` script that would otherwise generate the gitignored `src/icons/`
      # tree first. Pre-generate it here so `src/icons.ts`'s barrel resolves.
      - name: Generate icons
        run: pnpm --filter @flanksource/clicky-ui run build:icons
      - name: Gavel test + lint
        uses: flanksource/gavel@1632f718fbd850658c4a04818b800991039f1b74 # v0.0.46
        with:
          args: test --lint
          comment-header: gavel
          artifact-name: gavel-results

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - run: corepack enable

      - name: Install Vite+
        run: curl -fsSL https://vite.plus | bash
      - name: Add Vite+ to PATH
        run: echo "$HOME/.vite-plus/bin" >> "$GITHUB_PATH"

      - run: vp install
      - name: Build library
        run: pnpm --filter @flanksource/clicky-ui run build
      - name: Build Storybook
        run: pnpm --filter storybook exec storybook build --disable-telemetry
      - name: Build kitchen-sink
        run: pnpm --filter kitchen-sink exec vite build
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            packages/ui/dist
            apps/storybook/storybook-static
            apps/kitchen-sink/dist
          retention-days: 7

  e2e:
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - run: corepack enable

      - name: Install Vite+
        run: curl -fsSL https://vite.plus | bash
      - name: Add Vite+ to PATH
        run: echo "$HOME/.vite-plus/bin" >> "$GITHUB_PATH"

      - run: vp install
      - name: Build library
        run: pnpm --filter @flanksource/clicky-ui run build
      - name: Run Playwright tests
        run: pnpm --filter e2e exec playwright test --project=chromium
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report
          retention-days: 7
