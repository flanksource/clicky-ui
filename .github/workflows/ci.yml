name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: corepack enable

      - name: Install Vite+
        run: curl -fsSL https://vite.plus | bash
      - name: Add Vite+ to PATH
        run: echo "$HOME/.vite-plus/bin" >> "$GITHUB_PATH"

      - run: vp install
      - name: Run unit tests
        run: pnpm --filter @flanksource/clicky-ui run test

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: corepack enable

      - name: Install Vite+
        run: curl -fsSL https://vite.plus | bash
      - name: Add Vite+ to PATH
        run: echo "$HOME/.vite-plus/bin" >> "$GITHUB_PATH"

      - run: vp install
      - name: Build library
        run: pnpm --filter @flanksource/clicky-ui run build
      - name: Build Storybook
        run: pnpm --filter storybook exec storybook build --disable-telemetry
      - name: Build kitchen-sink
        run: pnpm --filter kitchen-sink exec vite build
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            packages/ui/dist
            apps/storybook/storybook-static
            apps/kitchen-sink/dist
          retention-days: 7

  e2e:
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: corepack enable

      - name: Install Vite+
        run: curl -fsSL https://vite.plus | bash
      - name: Add Vite+ to PATH
        run: echo "$HOME/.vite-plus/bin" >> "$GITHUB_PATH"

      - run: vp install
      - name: Install Playwright system dependencies
        timeout-minutes: 5
        run: pnpm --filter e2e exec playwright install-deps chromium
      - name: Install Playwright browsers
        timeout-minutes: 5
        run: pnpm --filter e2e exec playwright install chromium
      - name: Build library
        run: pnpm --filter @flanksource/clicky-ui run build
      - name: Run Playwright tests
        run: pnpm --filter e2e exec playwright test --project=chromium
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report
          retention-days: 7
