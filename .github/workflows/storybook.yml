name: Storybook

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - closed
permissions:
  contents: write
  pull-requests: write

concurrency:
  group: storybook-preview-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  preview:
    name: Storybook Preview
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable pnpm
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build UI package
        run: pnpm --filter @flanksource/clicky-ui build

      - name: Build Storybook
        run: pnpm --filter storybook build
        env:
          STORYBOOK_BASE_PATH: /${{ github.event.repository.name }}/storybook/pr-${{ github.event.pull_request.number }}/

      - name: Deploy PR preview
        uses: rossjrw/pr-preview-action@v1
        with:
          action: deploy
          source-dir: apps/storybook/storybook-static
          preview-branch: gh-pages
          umbrella-dir: storybook

  delete-preview:
    name: Delete Storybook Preview
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Delete PR preview
        uses: rossjrw/pr-preview-action@v1
        with:
          action: remove
          preview-branch: gh-pages
          umbrella-dir: storybook
